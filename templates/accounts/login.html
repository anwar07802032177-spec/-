{% extends 'base.html' %}
{% load django_bootstrap5 %}
{% block title %}تسجيل الدخول{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card stat-card shadow-sm">
            <div class="card-body p-4">
                <h4 class="text-center mb-4"><i class="bi bi-people-fill text-primary"></i> جمعيتي</h4>
                <h6 class="text-center text-muted mb-4">تسجيل الدخول</h6>
                <form method="post">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    <button type="submit" class="btn btn-primary w-100">دخول</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
