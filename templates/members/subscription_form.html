{% extends 'base.html' %}
{% load django_bootstrap5 %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<h3 class="mb-3">{{ title }} — {{ member.full_name }}</h3>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% bootstrap_form form %}
            <button type="submit" class="btn btn-primary">حفظ</button>
            <a href="{% url 'member_detail' member.pk %}" class="btn btn-outline-secondary">إلغاء</a>
        </form>
    </div>
</div>
{% endblock %}
